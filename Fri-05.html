<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Programme for Friday 05-June-2026</title>

  <style>
    body {
      font-family: Inter, system-ui, Arial, sans-serif;
      padding: 20px;
      background: #fff;
      color: #222;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 12px;
    }
    .back {
      margin-bottom: 12px;
      display: inline-block;
    }
    table.timeline {
      width: 100%;
      border-collapse: collapse;
    }
    table.timeline td {
      border: 1px solid #e0e0e0;
      padding: 10px;
      vertical-align: top;
    }
    table.timeline td.time {
      width: 110px;
      white-space: nowrap;
      font-weight: 600;
    }
    @media (max-width: 600px) {
      table.timeline td.time {
        width: 90px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Programme for Friday 05‑June‑2026</h1>

    <table class="timeline" aria-label="Friday program">
      <tbody id="timeline-body"></tbody>
    </table>
  </div>

  <script>
    fetch('https://script.google.com/macros/s/AKfycbx_1ZgtsyNvdcd027rrZlbDclPffinsDBxIOhoJL_fsNvce86Deid4WFibcHOjmX6pyNg/exec?day=Fri-05')
      .then(response => response.json())
      .then(data => {
        const tbody = document.getElementById('timeline-body');
        tbody.innerHTML = '';

        data.items.forEach(item => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="time">${item.time}</td>
            <td class="event">${item.description}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(err => console.error('Failed to load timeline', err));
  </script>
</body>
</html>
