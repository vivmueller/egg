<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Program for Wednesday 03-June-2026</title>
  ./styles.css
  <style>
    body{font-family:Inter, system-ui, Arial, sans-serif;padding:20px;background:#fff;color:#222}
    .container{max-width:980px;margin:0 auto}
    h1{font-size:1.25rem;margin:0 0 12px}
    .back{margin-bottom:12px;display:inline-block}
    table.timeline{width:100%;border-collapse:collapse}
    table.timeline td{border:1px solid #e0e0e0;padding:10px;vertical-align:top}
    table.timeline td.time{width:110px;white-space:nowrap;font-weight:600}
    table.timeline td.event{}
    @media(max-width:600px){ table.timeline td.time{width:90px} }
  </style>
</head>

<body>
  <div class="container">
    ./index.html← Back</a>
    <h1>Program for Wednesday 03-June-2026</h1>

    <table class="timeline" role="presentation" aria-label="Wednesday program">
      <tbody id="timeline-body"></tbody>
    </table>
  </div>

  <script>
    const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE?day=Wed-03';

    fetch(API_URL)
      .then(r => r.json())
      .then(data => {
        const tbody = document.getElementById('timeline-body');
        data.items.forEach(item => {
          tbody.insertAdjacentHTML('beforeend', `
            <tr>
              <td class="time">${item.time}</td>
              <td class="event">${item.description}</td>
            </tr>
          `);
        });
      });
  </script>
</body>
</html>
